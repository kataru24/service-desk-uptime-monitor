apiVersion: apps/v1
kind: Deployment

metadata:
  name: service-desk-uptime-monitor
  namespace: uptime-monitor

spec:
  replicas: 2

  selector:
    matchLabels:
      app: service-desk-uptime-monitor

  template:
    metadata:
      labels:
        app: service-desk-uptime-monitor

    spec:
      automountServiceAccountToken: false

      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001

        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: uptime-monitor

          image: ghcr.io/kataru24/service-desk-uptime-monitor:910e0f5b7f6d04da223c683dcf5debc51029ab2f

          imagePullPolicy: Always

          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true

            capabilities:
              drop:
                - ALL

          ports:
            - name: http
              containerPort: 8000

          readinessProbe:
            httpGet:
              path: /health
              port: http

            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: http

            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

          resources:
            requests:
              cpu: 50m
              memory: 64Mi

            limits:
              cpu: 500m
              memory: 256Mi